<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet" role="img" viewBox="0 0 600 650"><title id="title">Hyphonical terminal card</title><desc id="desc">A stylized terminal card with profile, contact and repo highlights.</desc><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" lang="en"><style>@keyframes blink{50%{opacity:0}}@keyframes gradient-move{0%{background-position:0 50%}50%{background-position:100% 50%}}:root{--bg:#0d1117;--panel:#161b22;--panel-glow:#1f2630;--border:rgba(255,255,255,0.08);--text:#d1d5db;--text-dim:#6e7681;--accent:#7aa2ff;--accent-2:#b388ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--radius-lg:1.125rem;--radius-md:0.75rem;--space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:0.875rem;--space-5:1rem;--space-6:1.25rem;--space-7:1.375rem;--shadow-1:0 0 0 1px var(--border);--shadow-2:0 4px 18px -4px rgba(0,0,0,0.6);--shadow-3:0 10px 32px -6px rgba(0,0,0,0.55);--shadow-4:0 0 40px -10px rgba(122,162,255,0.25);--font-mono:&quot;Fira Code&quot;, ui-monospace, SFMono-Regular, Menlo, Consolas, &quot;Liberation Mono&quot;, monospace;--fz-xs:0.78rem;--fz-sm:0.84rem;--fz-md:0.9rem;--fz-term:0.85rem}.card,.card:before{border-radius:var(--radius-lg)}.card{font-family:var(--font-mono);background:radial-gradient(circle at 85% 15%,rgba(122,162,255,.12),transparent 60%),radial-gradient(circle at 10% 90%,rgba(179,136,255,.15),transparent 70%),var(--panel);position:relative;padding:var(--space-4) var(--space-5) var(--space-7);width:min(92vw,31.25rem);max-width:31.25rem;margin:var(--space-3) auto;box-shadow:var(--shadow-1),var(--shadow-2),var(--shadow-3),var(--shadow-4);overflow:hidden;color:var(--text)}.card:before{content:&quot;&quot;;position:absolute;inset:0;padding:1px;background:linear-gradient(135deg,#84ffc9 0,#aab2ff 35%,#eca0ff 65%,#fcb2b2 100%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.35;pointer-events:none}.window-bar{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3);user-select:none;position:relative}.dots{display:flex;gap:calc(var(--space-2) - 2px)}.dot{width:12px;height:12px;border-radius:50%}.dot.red{background:#ffb3aa}.dot.yellow{background:#ffe6aa}.dot.green{background:#b4f5c1}.title{font-size:var(--fz-xs);letter-spacing:.08em;padding:2px 10px 0;text-transform:uppercase;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;color:transparent;font-weight:600;opacity:.85;margin:0;position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;white-space:nowrap}.terminal{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-6) var(--space-6) var(--space-7);font-size:var(--fz-term);line-height:1.45;overflow:hidden;position:relative}.line{display:block;margin:0;line-height:1.8}.line.cmd{margin-top:var(--space-3);margin-bottom:calc(var(--space-2) - 2px)}a{color:var(--accent);text-decoration:underline}a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}.prompt{color:var(--green)}.path{color:var(--accent)}.symbol{color:var(--accent-2)}.gradient{font-weight:600;background:linear-gradient(90deg,#84ffc9,#aab2ff,#eca0ff,#fcb2b2);background-size:220% 220%;animation:gradient-move 5s ease-in-out infinite;-webkit-background-clip:text;color:transparent;line-height:1}.cursor{display:inline-block;width:9px;height:1.05em;background:var(--accent);margin-left:4px;border-radius:2px;animation:blink 1.1s steps(1) infinite;vertical-align:middle}.badge,.footer{color:var(--text-dim)}.footer{margin-top:var(--space-4);font-size:.72rem;display:flex;flex-wrap:wrap;gap:4px}.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:linear-gradient(135deg,#232b35,#1a212b);border:1px solid var(--border);margin:2px 6px 0 0}@media (prefers-reduced-motion:reduce){.card:before,.cursor,.gradient{animation:none}.cursor{opacity:1}}</style><div aria-label="Terminal window" class="card" role="group"><div aria-hidden="true" class="window-bar"><div class="dots"><div class="dot red"/><div class="dot yellow"/><div class="dot green"/></div><div class="title">Bash / Terminal</div></div><div aria-multiline="true" class="terminal" role="textbox"><span class="line"><span class="prompt">root@hypho.dev</span>:<span class="path">~/docker</span>$<span class="symbol">whoami</span></span><span class="line">• Name :<span class="gradient">Hyphonical</span>~ 💙</span><span class="line">• Country : Belgium 🇧🇪</span><span class="line">• Hobbies : Climbing, Coding, Gaming 🧗‍♂️</span><span class="line">• Skills : Docker, CI/CD 🛠️</span><span class="line">• Languages : Python, Bash, YAML, JSON, Markdown 🐍</span><span class="line">• Interests : Open Source, UI/UX, Cloud ☁️</span><span class="line">• Studying : Design &amp; Production ~ Thomas More 🎒</span><span class="line cmd"><span class="prompt">root@hypho.dev</span>:<span class="path">~/docker</span>$<span class="symbol">gh profile | jq --compact-output</span></span><span class="line">• Focus : Automation ~ Docker 🐳</span><span class="line">• Contact :<a href="mailto:contact@hypho.dev">contact@hypho.dev</a>📫</span><span class="line">• Public Instances :<a href="https://dash.hypho.dev">https://dash.hypho.dev</a>🌐</span><span class="line cmd"><span class="prompt">root@hypho.dev</span>:<span class="path">~/docker</span>$<span class="symbol">gh repo list --limit 3</span></span><span class="line">Hyphonical/Hyphonical Public Updated 6h ago 🥇</span><span class="line">Hyphonical/Blockadeer Public Updated 21h ago 🥈</span><span class="line">Hyphonical/turboquant_plus Public Updated 5d ago 🥉</span><span class="line cmd"><span class="prompt">root@hypho.dev</span>:<span class="path">~/docker</span>$<span aria-hidden="true" class="cursor"/></span></div><div aria-label="Skills" class="footer"><div class="badge">Python</div><div class="badge">Git</div><div class="badge">CAD/CAM/G-Code</div></div></div></div></foreignObject></svg>